services:
  redis:
    image: redis:7-alpine
    container_name: appkerja-be-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - app-bridge
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # NestJS Application Service (Production)
  app:
    profiles:
      - prod
    build:
      context: .
      dockerfile: Dockerfile.prod
      target: production
    container_name: appkerja-be-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
      RUN_SEEDERS: ${RUN_SEEDERS:-true}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "${PORT:-3000}:3000"
    networks:
      - app-bridge
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # NestJS Application Service (Development)
  app-dev:
    profiles:
      - dev
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: appkerja-be-app-dev
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Migration & Seeder Control (auto-enabled in development)
      NODE_ENV: development
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
      RUN_SEEDERS: ${RUN_SEEDERS:-true}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "${PORT:-3000}:3000"
    networks:
      - app-bridge
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: bun run start:dev
    
networks:
  app-bridge:
    external: true

volumes:
  redis-data:

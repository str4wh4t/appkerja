services:
  minio:
    image: minio/minio:latest
    container_name: appkerja-minio
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      # S3-compatible site region (not a real AWS AZ; SDKs still require a region string).
      MINIO_SITE_REGION: ${MINIO_SITE_REGION:-us-east-1}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - app-bridge

  minio-init:
    image: minio/mc:latest
    container_name: appkerja-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_DEFAULT_BUCKET: ${MINIO_DEFAULT_BUCKET:-appkerja-documents}
      MINIO_PUBLIC_BUCKET: ${MINIO_PUBLIC_BUCKET:-appkerja-public-documents}
    volumes:
      - ./scripts/init-minio.sh:/init-minio.sh:ro
    entrypoint: ["/bin/sh", "/init-minio.sh"]
    networks:
      - app-bridge

volumes:
  minio_data:
    name: appkerja_minio_data

networks:
  app-bridge:
    external: true